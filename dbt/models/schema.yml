version: 2

sources:
  - name: olist_raw
    database: olist_warehouse
    schema: public
    description: "Raw Olist e-commerce dataset loaded from CSV files"
    tables:
      - name: raw_orders
        description: "All orders placed on the Olist platform"
        columns:
          - name: order_id
            tests: [unique, not_null]
      - name: raw_customers
        columns:
          - name: customer_id
            tests: [unique, not_null]
      - name: raw_order_payments
      - name: raw_order_items
      - name: raw_products
        columns:
          - name: product_id
            tests: [unique, not_null]
      - name: raw_sellers
        columns:
          - name: seller_id
            tests: [unique, not_null]
      - name: raw_order_reviews
      - name: raw_geolocation
      - name: raw_product_category_translation

models:
  - name: stg_orders
    description: "Cleaned orders with typed timestamps"
    columns:
      - name: order_id
        tests: [unique, not_null]

  - name: fct_orders
    description: "Fact table: one row per order with payment + item aggregates"
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: total_payment_value
        

  - name: dim_customers
    description: "Customer dimension with LTV and segmentation"
    columns:
      - name: customer_id
        tests: [unique, not_null]

  - name: dim_products
    description: "Product dimension with sales metrics"
    columns:
      - name: product_id
        tests: [unique, not_null]
