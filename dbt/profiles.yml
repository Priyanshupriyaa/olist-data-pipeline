olist_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      user: "{{ env_var('DBT_USER', 'airflow') }}"
      password: "{{ env_var('DBT_PASSWORD', 'airflow') }}"
      port: 5432
      dbname: olist_warehouse
      schema: staging
      threads: 4
      keepalives_idle: 0
    prod:
      type: postgres
      host: "{{ env_var('DBT_HOST') }}"
      user: "{{ env_var('DBT_USER') }}"
      password: "{{ env_var('DBT_PASSWORD') }}"
      port: 5432
      dbname: olist_warehouse
      schema: staging
      threads: 8
      keepalives_idle: 0
